<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css" />
    <link rel="stylesheet" href="/src/styles/components/base.css" />
    <link rel="stylesheet" href="/src/styles/components/layout.css" />
    <link rel="stylesheet" href="/src/styles/layout.css" />
    <link rel="stylesheet" href="/src/styles/pages/admin/historial-plans.css" />
    <title>Historial de Pagos</title>
    <script type="module" src="/src/scripts/utils/accesoAuth.js"></script>
  </head>
  <body>
    <header class="history-header">
      <a href="/public/admin/plans/gest-plans.html" class="history-header__back">
        <img
          src="/assets/icons/arrow-90deg-left.svg"
          alt="Volver"
          class="history-header__back-icon"
        />
      </a>
      <h1 class="history-header__title">Historial Pagos</h1>
      <div class="history-header__separator"></div>
    </header>

    <main class="history-content">
      <div class="payment-table">
        <div class="payment-table__header">
          <div class="payment-table__column">ID Transaccion</div>
          <div class="payment-table__column">Usuario</div>
          <div class="payment-table__column">Fecha</div>
          <div class="payment-table__column">Estado</div>
        </div>

        <div class="payment-table__body" id="admin-payments-list"></div>
      </div>
    </main>

    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <script type="module" src="/src/scripts/pages/admin/historial-plans.js"></script>
  </body>
</html>
