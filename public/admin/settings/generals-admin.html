<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/src/styles/components/base.css" />
    <link rel="stylesheet" href="/src/styles/components/settings-header.css" />
    <link rel="stylesheet" href="/src/styles/components/settings-option.css" />
    <link rel="stylesheet" href="/src/styles/pages/admin/generals-admin.css" />
    <link rel="stylesheet" href="/src/styles/components/settings-footer.css" />
    <link rel="stylesheet" href="/src/styles/layout.css" />
    <title>Configuraciones Generales - Admin</title>
    <script type="module" src="/src/scripts/utils/accesoAuth.js"></script>
    <script type="module" src="/src/scripts/utils/theme-manager.js"></script>
    <script type="module" src="/src/scripts/utils/language-manager.js"></script>
  </head>
  <body>
    <header class="settings-header">
      <div class="settings-header__top">
        <a href="../dashboard-admin.html" class="settings-header__back">
          <img
            src="/assets/icons/arrow-90deg-left.svg"
            alt="Volver"
            class="settings-header__arrow"
          />
        </a>
        <h1 class="settings-header__title">Configuraciones</h1>
      </div>

      <div class="settings-separator"></div>

      <nav class="settings-nav">
        <a href="settings-admin.html" class="settings-nav__link">
          <img
            src="/assets/icons/user-settings.png"
            alt="Perfil"
            class="settings-nav__icon"
          />
        </a>
        <a href="#" class="settings-nav__link">
          <img
            src="/assets/icons/settings-module.png"
            alt="Ajustes"
            class="settings-nav__icon"
          />
        </a>
      </nav>
    </header>

    <main class="settings-main">
      <section class="settings-section">
        <h2 class="settings-section__title">Generales</h2>

        <div class="settings-dropdown">
          <label class="settings-dropdown__trigger" for="button_tema">
            <span class="settings-option__label">Tema:</span>
            <span class="settings-option__value" id="button_tema">Oscuro</span>
          </label>
          <div id="drop_colors">
            <button class="settings-dropdown__btn settings-dropdown__btn--dark" type="button">
              Oscuro
            </button>
            <button class="settings-dropdown__btn settings-dropdown__btn--light" type="button">
              Claro
            </button>
          </div>
        </div>

        <div class="settings-option">
          <span class="settings-option__label">Notificación</span>
          <label class="switch">
            <input type="checkbox" id="admin-notifications-toggle" />
            <span class="slider"></span>
          </label>
        </div>

        <div class="settings-dropdown">
          <label class="settings-dropdown__trigger" id="language_trigger" for="button_idioma">
            <span class="settings-option__label">Idioma</span>
            <span class="settings-option__value" id="button_idioma">Español</span>
          </label>
          <div class="settings-dropdown__content" id="drop_languages">
            <button class="settings-dropdown__btn settings-dropdown__btn--dark" data-language="es" type="button">
              Español
            </button>
            <button class="settings-dropdown__btn settings-dropdown__btn--dark" data-language="en" type="button">
              Inglés
            </button>
            <button class="settings-dropdown__btn settings-dropdown__btn--dark" data-language="de" type="button">
              Alemán
            </button>
            <button class="settings-dropdown__btn settings-dropdown__btn--dark" data-language="fr" type="button">
              Francés
            </button>
            <button class="settings-dropdown__btn settings-dropdown__btn--dark" data-language="ja" type="button">
              Japonés
            </button>
          </div>
        </div>

        <div class="settings-option">
          <span class="settings-option__label">Modelos:</span>
          <a href="modelsAI-admin.html" class="settings-option__link">AI (poly)</a>
        </div>
      </section>
    </main>

    <footer class="settings-footer">
      <div class="settings-footer__container">
        <button class="settings-footer__delete-btn" type="button">Guardar preferencias locales</button>
      </div>
    </footer>

    <script type="module" src="/src/scripts/pages/settings/settings-general.js"></script>
    <script type="module" src="/src/scripts/pages/admin/generals-admin.js"></script>
  </body>
</html>
