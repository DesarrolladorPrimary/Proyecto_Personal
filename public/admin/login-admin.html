<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Admin</title>
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css" />
    <link rel="stylesheet" href="/src/styles/components/base.css" />
    <link rel="stylesheet" href="/src/styles/components/form-feedback.css" />
    <link rel="stylesheet" href="/src/styles/layout.css" />
    <link rel="stylesheet" href="/src/styles/pages/admin/login-admin.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
    <script type="module" src="/src/scripts/utils/accesoAuth.js"></script>
  </head>
  <body>
    <header class="header">
      <h1 class="header__title">Inicio Admin</h1>
    </header>
    <main class="main">
      <form method="POST" class="form" id="admin-login-form">
        <div class="form__input-container" data-field>
          <img src="/assets/icons/email.png" class="form__input-icon" alt="Icono" />
          <input
            type="email"
            id="admin_email"
            name="username"
            required
            class="form__input"
            placeholder="Correo"
            pattern="[a-zA-Z0-9._%+-]+@[a-zA-Z0-9._%+-]+\.[a-zA-Z]{2,100}"
            title="El correo debe tener la estructura correo@dominio.com"
            maxlength="120"
          />
        </div>

        <div class="form__input-container" data-field>
          <img
            src="/assets/icons/padlock.png"
            class="form__input-icon"
            alt="Icono de contrasena"
          />
          <input
            type="password"
            id="admin_password"
            name="password"
            required
            class="form__input"
            placeholder="Contrasena"
            maxlength="64"
          />
        </div>

        <p class="form__contrasena">
          Acceso exclusivo para cuentas con rol administrador
        </p>

        <button type="submit" class="button">
          <span class="button-link">Iniciar</span>
        </button>
      </form>
    </main>
    <footer class="footer">
      <p class="footer__text">Acceso restringido a administradores</p>
    </footer>

    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <script type="module" src="/src/scripts/pages/admin/login-admin.js"></script>
  </body>
</html>
