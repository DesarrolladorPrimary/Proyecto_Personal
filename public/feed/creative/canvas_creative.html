<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/src/styles/components/base.css" />
    <link rel="stylesheet" href="/src/styles/components/layout.css" />
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link
      rel="stylesheet"
      href="/src/styles/pages/feed/creative/canvas_creative.css"
    />
    <title>Canvas Creative</title>
      <script type="module" src="/src/scripts/utils/accesoAuth.js"></script>
  </head>
  <body>
    <header class="header">
      <div class="header__nav">
        <div class="header__nav-line">
          <a
            href="#sidebar"
            class="header__nav-link header__nav-link--action"
          ></a>
        </div>
      </div>

      <a href="#user" class="header__logo">
        <img src="/assets/icons/image.png" alt="Perfil de usuario" />
      </a>
    </header>

    <main class="canvas-layout" id="canvasLayout">
      <section class="canvas-main">
        <header class="canvas-main__header">
          <h1 class="canvas-main__title" contenteditable="true" id="creative-canvas-title">Titulo</h1>
          <span class="canvas-main__counter" id="creative-canvas-counter">0 palabras</span>
        </header>
        <div class="canvas-main__divider"></div>
        <textarea
          class="canvas-main__body"
          id="creative-canvas-body"
          placeholder="Inspírate aquí..."
        ></textarea>
        <footer class="canvas-main__footer">
          <div class="canvas-main__markers" id="herramientas">
            <button type="button" class="canvas-main__marker" data-tool="undo" title="Deshacer">↶</button>
            <button type="button" class="canvas-main__marker" data-tool="redo" title="Rehacer">↷</button>
            <button type="button" class="canvas-main__marker" data-tool="heading" title="Encabezado">H1/H2</button>
            <button type="button" class="canvas-main__marker" data-tool="bold" title="Negrita">B</button>
            <button type="button" class="canvas-main__marker" data-tool="italic" title="Cursiva">I</button>
            <button type="button" class="canvas-main__marker" data-tool="underline" title="Subrayado">U</button>
            <button type="button" class="canvas-main__marker" data-tool="list" title="Lista">•/1</button>
            <button type="button" class="canvas-main__marker" data-tool="quote" title="Cita">❝</button>
            <button type="button" class="canvas-main__marker" data-tool="separator" title="Separador">↔</button>
            <button type="button" class="canvas-main__marker" data-tool="emdash" title="Raya">—</button>
            <button type="button" class="canvas-main__marker" data-tool="correct" title="Corregir texto">⚙</button>
            <button type="button" class="canvas-main__marker" data-tool="style" title="Mejorar estilo">💡</button>
            <button type="button" class="canvas-main__marker" data-tool="continue" title="Continuar relato">...</button>
            <button type="button" class="canvas-main__marker" data-tool="scene" title="Corte de escena">●</button>
          </div>
          <p class="canvas-main__tool-status" id="creative-tool-status">
            Selecciona texto o usa las ayudas para seguir escribiendo.
          </p>
          <button class="canvas-main__action" type="button" id="creative-save-draft">Guardar borrador</button>
          <button class="canvas-main__quill" type="button">
            <a
              href="#herramientas"
              class="canvas-main__quill-link"
              aria-label="Abrir opciones de pluma"
            >
              <img
                class="canvas-main__quill--img"
                src="/assets/icons/pluma.png"
                alt=""
              />
            </a>
          </button>
        </footer>
        <div class="canvas-main__divider canvas-main__divider--bottom"></div>
      </section>
    </main>

    <section class="canvas-book-modal" id="canvasBookModal" aria-hidden="true">
      <div class="canvas-book-modal__overlay" aria-hidden="true"></div>
      <article
        class="canvas-book-modal__panel"
        role="dialog"
        aria-modal="true"
        aria-labelledby="canvas-book-modal-title"
      >
        <a
          href="#canvasLayout"
          class="canvas-book-modal__close"
          aria-label="Cerrar conversin a libro"
        ></a>
        <header class="canvas-book-modal__header">
          <h2 class="canvas-book-modal__title" id="canvas-book-modal-title">
            Convertir historia a libro
          </h2>
          <div class="canvas-book-modal__divider"></div>
        </header>
        <form class="canvas-book-modal__form" id="creative-export-form">
          <label class="canvas-book-modal__label" for="canvas-book-title"
            >Titulo del libro:</label
          >
          <input
            class="canvas-book-modal__input"
            id="canvas-book-title"
            type="text"
            value="Mi historia creativa"
          />
          <label class="canvas-book-modal__label" for="canvas-book-format"
            >Formato:</label
          >
          <select class="canvas-book-modal__input" id="canvas-book-format">
            <option value="word">Word (.doc)</option>
            <option value="pdf">PDF (.pdf)</option>
          </select>
          <button class="canvas-book-modal__submit" type="submit">
            <img
              src="/assets/icons/addLibro.png"
              alt=""
              class="canvas-book-modal__submit-icon"
            />
            Generar documento
          </button>
        </form>
      </article>
    </section>

    <section
      class="canvas-book-success"
      id="canvasBookSuccess"
      aria-hidden="true"
    >
      <div class="canvas-book-success__overlay" aria-hidden="true"></div>
      <article
        class="canvas-book-success__panel"
        role="dialog"
        aria-modal="true"
        aria-labelledby="canvas-book-success-message"
      >
        <p
          class="canvas-book-success__message"
          id="canvas-book-success-message"
        >
          Libro generado con éxito.<br />Guardado en tu Biblioteca.
        </p>
        <a
          href="#canvasLayout"
          class="canvas-book-success__close"
          aria-label="Cerrar mensaje de xito"
          >Entendido</a
        >
      </article>
    </section>

    <aside class="canvas-sidebar" id="sidebar">
      <div class="canvas-sidebar__header">
        <p class="canvas-sidebar__title">Lienzos</p>
        <button class="canvas-sidebar__button" type="button" id="creative-canvas-new">Nuevo lienzo</button>
      </div>

      <div class="canvas-sidebar__separator"></div>
      <div id="creative-canvas-story-list"></div>
      <a href="#" class="canvas-sidebar__close"></a>
    </aside>

    <footer class="canvas-footer">
      <a class="canvas-footer__line" href="../feed-main.html"></a>
    </footer>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <script type="module" src="/src/scripts/pages/creative/canvas-creativo.js"></script>
  </body>
</html>
