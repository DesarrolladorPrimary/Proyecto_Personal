<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sección Creativa</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/src/styles/components/base.css" />
    <link rel="stylesheet" href="/src/styles/components/layout.css" />
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css" />
    <link
      rel="stylesheet"
      href="/src/styles/pages/feed/creative/seccion_creativa.css"
    />
    <script type="module" src="/src/scripts/utils/accesoAuth.js"></script>
  </head>
  <body>
    <header class="header">
      <div class="header__nav">
        <div class="header__nav-line">
          <a
            href="#sidebar"
            class="header__nav-link header__nav-link--action"
          ></a>
        </div>
      </div>

      <a href="#user" class="header__logo">
        <img src="/assets/icons/image.png" alt="Perfil de usuario" />
      </a>
    </header>

    <main class="creative-main">
      <div class="creative-main__container">
        <img
          class="creative-main__img"
          src="/assets/image/pergamino_creative.png"
          alt="Inspiración creativa"
        />
        <p class="creative-main__text">¿Qué haras hoy?</p>
      </div>

      <form class="creative-input">
        <button type="button" class="creative-input__link creative-input__button" id="creative-new-story">
          Nuevo lienzo
        </button>
      </form>
    </main>

    <aside class="creative-aside" id="sidebar">
      <div class="creative-aside__header">
        <p class="creative-aside__title">Relatos</p>
        <button class="creative-aside__button" type="button" id="creative-sidebar-new">Nuevo lienzo</button>
      </div>

      <div class="creative-aside__separator"></div>
      <div id="creative-story-list"></div>
      <a href="#" class="creative-aside__close"></a>
    </aside>

    <footer class="footer-nav">
      <a class="footer-nav__line" href="../feed-main.html"></a>
    </footer>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <script type="module" src="/src/scripts/pages/creative/seccion-creativa.js"></script>
  </body>
</html>
