<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificar correo</title>
    <link rel="stylesheet" href="/src/styles/components/base.css">
    <link rel="stylesheet" href="/src/styles/pages/auth/recovery_passwd_messaje.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <link rel ="stylesheet" type ="text/css" href ="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css" >
    <script type="module" src="/src/scripts/utils/theme-manager.js"></script>
</head>

<body>

    <main class="recovery-password">
        <div class="recovery-password__container recovery-password__container--status" id="status-card">
            <span class="recovery-password__icon recovery-password__icon--loading" id="icono" aria-hidden="true">...</span>
            <span class="recovery-password__eyebrow" id="estado-etiqueta">Verificacion</span>
            <h1 class="recovery-password__title" id="titulo">Verificando...</h1>
            <p class="recovery-password__description" id="descripcion">Por favor espera mientras verificamos tu correo.</p>
            <div class="recovery-password__actions" id="acciones">
                <a href="login.html" class="recovery-password__button recovery-password__button--link" id="link-login" style="display: none;">Ir al login</a>
                <a href="recovery_passwd.html" class="recovery-password__secondary-link" id="link-recovery" style="display: none;">Solicitar nuevo enlace</a>
            </div>
        </div>
    </main>

    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <script type="module">
        import { buildApiUrl } from "/src/scripts/utils/api-config.js";

        document.addEventListener('DOMContentLoaded', async () => {
            const titulo = document.getElementById('titulo');
            const descripcion = document.getElementById('descripcion');
            const linkLogin = document.getElementById('link-login');
            const linkRecovery = document.getElementById('link-recovery');
            const icono = document.getElementById('icono');
            const estadoEtiqueta = document.getElementById('estado-etiqueta');
            const statusCard = document.getElementById('status-card');

            // Obtener token de la URL
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');

            if (!token) {
                statusCard.classList.add('recovery-password__container--error');
                icono.textContent = '!';
                icono.classList.remove('recovery-password__icon--loading');
                estadoEtiqueta.textContent = 'Enlace invalido';
                titulo.textContent = 'Token inválido';
                descripcion.textContent = 'No se proporcionó ningún token de verificación.';
                linkRecovery.style.display = 'inline-flex';
                return;
            }

            try {
                const response = await fetch(buildApiUrl('/api/v1/verificar', { token }), {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });

                const data = await response.json();

                if (response.ok) {
                    statusCard.classList.add('recovery-password__container--success');
                    icono.textContent = '✓';
                    icono.classList.remove('recovery-password__icon--loading');
                    estadoEtiqueta.textContent = 'Cuenta verificada';
                    titulo.textContent = '¡Correo verificado!';
                    descripcion.textContent = 'Tu correo ha sido verificado correctamente. Ya puedes iniciar sesión.';
                    linkLogin.style.display = 'inline-flex';
                    
                    Toastify({
                        text: "Correo verificado correctamente",
                        duration: 3000,
                        gravity: "top",
                        position: "center",
                        style: { background: "green" },
                    }).showToast();
                } else {
                    statusCard.classList.add('recovery-password__container--error');
                    icono.textContent = '!';
                    icono.classList.remove('recovery-password__icon--loading');
                    estadoEtiqueta.textContent = 'No pudimos verificar';
                    titulo.textContent = 'Error';
                    descripcion.textContent = data.Mensaje || 'El token es inválido o ha expirado.';
                    linkRecovery.style.display = 'inline-flex';
                    
                    Toastify({
                        text: data.Mensaje || "Error al verificar",
                        duration: 3000,
                        gravity: "top",
                        position: "center",
                        style: { background: "red" },
                    }).showToast();
                }
            } catch (error) {
                statusCard.classList.add('recovery-password__container--error');
                icono.textContent = '!';
                icono.classList.remove('recovery-password__icon--loading');
                estadoEtiqueta.textContent = 'Sin conexion';
                titulo.textContent = 'Error de conexión';
                descripcion.textContent = 'No se pudo conectar con el servidor.';
                linkRecovery.style.display = 'inline-flex';
                
                Toastify({
                    text: "Error de conexión",
                    duration: 3000,
                    gravity: "top",
                    position: "center",
                    style: { background: "red" },
                }).showToast();
            }
        });
    </script>
</body>

</html>
