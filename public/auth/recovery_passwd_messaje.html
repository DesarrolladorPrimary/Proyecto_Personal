<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Correo enviado</title>
    <link rel="stylesheet" href="/src/styles/components/base.css">
    <link rel="stylesheet" href="/src/styles/pages/auth/recovery_passwd_messaje.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap">

    <script type="module" src="/src/scripts/utils/theme-manager.js"></script>
</head>

<body>

    <main class="recovery-password">
        <div class="recovery-password__container recovery-password__container--status recovery-password__container--success">
            <span class="recovery-password__icon" aria-hidden="true">✓</span>
            <span class="recovery-password__eyebrow">Correo enviado</span>
            <h1 class="recovery-password__title">Revisa tu bandeja</h1>
            <p class="recovery-password__description">Te enviamos un enlace de recuperación. Si no lo ves en unos minutos, revisa spam o correo no deseado.</p>
            <div class="recovery-password__actions">
                <a href="login.html" class="recovery-password__button recovery-password__button--link">Volver al login</a>
                <a href="recovery_passwd.html" class="recovery-password__secondary-link">Enviar de nuevo</a>
            </div>
        </div>
    </main>

</html>
